# --- Required Helpers ---
input_number:
  bchydro_total_kwh_store:
    name: BC Hydro Total kWh (Store)
    min: 0
    max: 999999
    step: 0.001
    mode: box
    unit_of_measurement: "kWh"
    initial: 0

input_text:
  bchydro_last_processed_date:
    name: BC Hydro Last Processed Date

# --- Template Sensor for Energy Dashboard ---
template:
  - sensor:
      - name: "BC Hydro Total kWh"
        unique_id: bchydro_total_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: "{{ states('input_number.bchydro_total_kwh_store') | float(0) }}"

# --- Pyscript Config ---
pyscript:
  allow_all_imports: true
  apps:
    bchydro:
      email: !secret bchydro_email
      password: !secret bchydro_password
      days: 35  # lookback window

# --- Automation ---
automation:
  - alias: "BC Hydro - Daily Update"
    trigger:
      - platform: time
        at: "09:00:00"
    action:
      - service: pyscript.bchydro_update
